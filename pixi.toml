[workspace]
name = "gdplib"
description = "Development environment for GDPlib"
authors = [
    "Qi Chen <qichen@andrew.cmu.edu>",
    "David E. Bernal Neira <dbernaln@purdue.edu>",
    "SECQUOIA",
]
channels = ["conda-forge"]
# This committed Pixi environment is Linux-only. Use the README pip workflow on
# other platforms, or add the platform here and regenerate pixi.lock.
platforms = ["linux-64"]
version = "0.1.0"

[dependencies]
python = ">=3.10,<3.13"
pip = "*"
pyomo = ">=5.6.1"
setuptools = ">=64"
setuptools-scm = ">=6.2"
wheel = "*"
pandas = ">=1.0.1"
matplotlib = ">=2.2.2"
scipy = ">=1.0.0"
pint = ">=0.15.0"
openpyxl = ">=3.0.0"
pytest = ">=6.0.0"
pytest-cov = ">=2.10.0"
black = ">=20.8b1"
flake8 = ">=3.8.0"
tabulate = ">=0.9.0"
typos = "*"

[pypi-dependencies]
gdplib = { path = ".", editable = true }

[tasks]
test = "pytest tests/ -v --tb=short"
test-imports = "pytest tests/test_module_imports.py -v --tb=short"
test-methanol = "pytest 'tests/test_module_imports.py::TestModelConstruction::test_model_construction[methanol]' -v --tb=short"
lint-black = "black -S -C --target-version py310 --check --diff ."
lint-flake8-critical = "flake8 gdplib/ --count --select=E9,F63,F7,F82 --show-source --statistics"
lint-flake8 = "flake8 gdplib/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics"
lint-typos = "typos --config ./.github/workflows/typos.toml"
lint = "black -S -C --target-version py310 --check --diff . && flake8 gdplib/ --count --select=E9,F63,F7,F82 --show-source --statistics && flake8 gdplib/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics && typos --config ./.github/workflows/typos.toml"
format = "black -S -C --target-version py310 ."
